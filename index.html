const qB=[
{id:1,title:"オーラルケア前のアセスメント",
ngSituation:"夕食後の口腔のケアの時間になったので、患者さんの口の中を見ずに、すぐに歯ブラシで磨き始めた。",
options:["歯磨き粉をつけ忘れたことがNG","口の中の状態を観察（アセスメント）せずにケアを始めたことがNG","歯ブラシを水で濡らさなかったことがNG"],
answer:1,
explanation:"口腔のケアを始める前には、必ず口の中の状態を観察してから始めてください。初回のアセスメントには専門的な評価ツールを用いることが推奨されますが、毎回のケアのたびにフルアセスメントを行うわけではありません。\n\n日々のケア直前には、特に以下の点の確認が重要になります。\n①嚥下機能の状況（むせの有無など）\n②動揺歯（グラグラしている歯）の有無\n③義歯（入れ歯）が装着されているか\n④口内炎などの痛みの有無\n\nまた、痰や唾液が口の奥にたまっている状態で歯磨きを始めると、その汚れた液体が気管に流れ込んで誤嚥性肺炎を起こす危険があります。たまっている場合は先に吸引してからケアを開始してください。",
refs:"【出典】Noguchi S, et al. (2018) Gerodontology — ROAG（口腔アセスメントツール）が誤嚥性肺炎リスク予測に有用であることを証明。研究デザイン：後方視的観察研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/30132974/\n\nFuruya J, et al. (2019) BMC Infect Dis — OHAT（口腔健康評価ツール）が口腔清掃状態をより精密に評価でき、誤嚥性肺炎患者の識別に高い精度を示した。研究デザイン：前向き観察研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/31805872/"},
{id:2,title:"ベッドの角度（体位管理①）",
ngSituation:"寝たきりの患者さんの口腔のケアをするために、ベッドを平らなまま（仰向けのまま）の状態で歯磨きを始めた。",
options:["ベッドを平らなまま口腔のケアをすると、水や汚れが喉の奥に流れ込んで誤嚥する危険が非常に高いためNG","平らなまま磨いた方が奥歯まで見えやすいので問題ない","ベッドは平らな方が患者さんがリラックスできるので正しい"],
answer:0,
explanation:"ベッドを平らにしたまま口腔のケアを行うと、口の中の水分や汚れが重力で喉の奥に流れ込み、誤嚥（ごえん＝食べ物や水分が気管に入ってしまうこと）する危険が非常に高くなります。\n\n口腔のケアを行うときは、必ずベッドの頭側を最低30度以上挙上（ギャッチアップ）してください。30～45度が推奨されています。この姿勢をとることで、重力により水や汚れが喉の奥に流れ込みにくくなります。\n\nただし、ベッドの角度を上げた後は、食事介助と同様に「圧抜き」（背中とマットレスの間に手を差し込んで圧迫を解放する操作）を忘れずに行ってください。\n\nまた、ベッドを上げられない場合は、顔を横に向ける（側臥位）ことで誤嚥リスクを下げることができます。",
refs:"【出典】AHRQ Head of Bed Elevation Literature Review — ベッド頭部30度以上の半座位が誤嚥予防に有効であることをCDC・ATS/IDSA等4大ガイドラインが一致して推奨。研究デザイン：系統的レビュー（複数RCT含む）／エビデンス確実性：高\nURL: https://scholar.google.com/scholar?q=AHRQ+Head+of+Bed+Elevation+Literature+Review\n\nMatsui T, et al. (2002) Gerontology — 臥床高齢者で座位保持が発熱日数を減少。研究デザイン：介入研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/12169805/"},
{id:3,title:"横向き（側臥位）の使い方",
ngSituation:"嚥下障害（飲み込みの障害）がある患者さんの口腔のケアで、仰向けのまま顔だけ横に向けて歯磨きを行った。",
options:["顔だけ横に向ければ誤嚥は防げるので問題ない","嚥下障害がある患者さんは、体ごと横向き（側臥位）にして、口の中の水分や汚れが自然に口の外へ流れ出るようにするべきなのでNG","横向きにすると歯ブラシが入りにくくなるので仰向けが正しい"],
answer:1,
explanation:"嚥下障害がある患者さんは、飲み込む力が弱いため、口の中にたまった水分や汚れを自力で吐き出すことが難しい場合があります。顔だけ横に向けても、体が仰向けのままだと喉の構造上、水分が気管の方向へ流れやすい状態は変わりません。\n\n安全に口腔のケアを行うためには、体ごと横向き（側臥位）にすることが重要です。横向きにすると、口の中の水分や汚れが重力で頬の内側（下になった側）にたまり、口の外に自然に流れ出やすくなります。\n\n重度の嚥下障害がある患者さんでは、完全に横を向いた姿勢（完全側臥位）をとることで、唾液の誤嚥すら物理的に防ぐことができるという報告もあります。",
refs:"【出典】完全側臥位法の有効性研究 (PMID:30760684) — 重度嚥下障害高齢者において完全側臥位が唾液誤嚥を物理的に防止。研究デザイン：症例研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/30760684/\n\nMetheny NA (2008/2018) AJN/HIGN — 嚥下障害患者への体位調整と誤嚥予防の推奨。研究デザイン：ガイドライン（エビデンスに基づく推奨）／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/18496117/"},
{id:4,title:"口腔のケア中の水分管理",
ngSituation:"嚥下障害のある患者さんの口腔のケアで、コップに水を入れて「ブクブクうがいをしてください」と促した。",
options:["うがいの水が冷たすぎたことがNG","嚥下障害がある患者さんに水でうがいをさせると、その水を飲み込めずに気管に入ってしまう危険があるためNG","うがいの回数が少なかったことがNG"],
answer:1,
explanation:"嚥下障害（飲み込みの障害）がある患者さんに水でのうがいをさせることは、非常に危険です。飲み込む力が弱いため、うがいの水をうまく吐き出せず、気管に流れ込んで誤嚥してしまう可能性があります。\n\nでは、歯磨きの後に口の中の汚れをどうやって取り除くのでしょうか？以下の方法があります。\n\n①【吸引器の使用】口腔のケア中に吸引器を使って、こまめに口の中の水分や汚れを吸い取ります。吸引チューブ付きの歯ブラシ（サクションブラシ）もあります。\n②【スポンジブラシ・口腔用ウェットティッシュ】水を使わずに口の中を拭き取る方法です。水でのすすぎの代わりとして有効であることが報告されています。\n③【少量の水を使う方法】10mlのシリンジ（注射器型の器具）で少量の水を口の中に入れ、すぐに吸引器で吸い取る方法もあります。\n\nいずれの場合も、ケア中は患者 handicapped さんの呼吸や表情をよく観察し、苦しそうな様子がないか確認してください。",
refs:"【出典】PMC 2023 Best Practice Protocol (PMC9944467) — 嚥下障害患者への口腔のケアでは吸引付き歯ブラシの使用・余分な分泌物の除去を推奨。研究デザイン：ベストプラクティス導入プロトコル／エビデンス確実性：低\nURL: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9944467/\n\nCochrane Review: Brady et al. (2021) — 脳卒中後の口腔のケアにおけるスポンジ・吸引の使用を評価。研究デザイン：系統的レビュー（RCT含む）／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/33400821/"},
{id:5,title:"ブラッシングの基本",
ngSituation:"口腔のケアの際、時間がないので歯の表面だけをサッと磨き、歯と歯ぐきの境目は特に意識せず、力を入れてゴシゴシと素早く磨いた。",
options:["力を入れてゴシゴシ磨いた方が汚れがよく落ちるので問題ない","歯と歯ぐきの境目を磨いていないこと、力が強すぎることがNG","歯の表面を磨くだけで十分なので問題ない"],
answer:1,
explanation:"歯磨きで最も汚れがたまりやすく、かつ肺炎の原因となる細菌が繁殖しやすい場所は「歯と歯ぐきの境目」です。歯の表面だけ磨いても、この境目に汚れ（歯垢＝しこう：細菌のかたまり）が残ったままでは、口の中の細菌量は十分に減りません。\n\n正しい磨き方のポイントは以下の通りです。\n①歯ブラシの毛先を歯と歯ぐきの境目に当てて、斜め45度の角度にします\n②2～3本の歯を一度に、小刻みに（5mm程度の幅で）やさしく振動させるように動かします\n③力は「歯ブラシの毛先が広がらない程度」が目安です（150～200g程度）\n④奥歯の奥、歯の裏側、歯と歯の間も忘れずに磨きます\n\n力を入れすぎると歯ぐきを傷つけて出血させてしまい、かえって細菌が血流に入る原因にもなります。",
refs:"【出典】Huang YT, et al. (2025) PMC12123995 — Bass法（歯肉溝に45度、小刻み振動）による口腔のケアが脳卒中急性期患者の口腔状態を有意に改善。研究デザイン：パイロットRCT／エビデンス確実性：低\nURL: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC12123995/\n\nDai et al. (2017) — 電動歯ブラシ＋CHX洗口が手用歯ブラシより有意にプラーク減少。研究デザイン：RCT／エビデンス確実性：高\nURL: https://scholar.google.com/scholar?q=Dai+electric+toothbrush+chlorhexidine+2017"},
{id:6,title:"舌の清掃",
ngSituation:"歯をしっかり磨いた後、舌の上に白っぽい汚れが付いていたが「舌は磨かなくてもいいだろう」と考え、そのままケアを終了した。",
options:["舌の汚れは味覚に関係するだけなので放置しても問題ない","舌の上の白い汚れ（舌苔）は細菌の温床であり、誤嚥性肺炎の原因になりうるため、清掃せずに放置したことがNG","舌は自浄作用があるので自然にきれいになる"],
answer:1,
explanation:"舌の上に付着する白～黄色っぽい汚れを「舌苔（ぜったい）」といいます。これは食べかす・細菌・はがれた粘膜（古い皮膚のようなもの）が混ざったもので、肺炎の原因となる細菌の大きな温床です。\n\n研究では、舌苔の付着が多い高齢者ほど誤嚥性肺炎を発症しやすいことが報告されています。\n\n舌の清掃方法は以下の通りです。\n①水で湿らせた歯ブラシまたは舌専用ブラシを用意します\n②舌の手前から奥ではなく、「奥から手前に向かって」やさしくなでるように動かします\n③強くこすらないでください。舌の表面の小さな突起（乳頭）を傷つけてしまいます\n④舌の奥の方（のどに近い部分）を刺激すると「オエッ」となる反射が起きやすいので、舌の前方2/3（手前側）を中心に清掃してください\n⑤1回のケアで3～5回程度なでれば十分です",
refs:"【出典】Abe S, et al. (2008) Arch Gerontol Geriatr — 舌苔が無歯顎高齢者の誤嚥性肺炎のリスク指標であることを実証。研究デザイン：横断観察研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/18262660/\n\nPMID:40966864 (2025) — 脳卒中患者の誤嚥性肺炎リスク因子として舌苔・剥離上皮・口腔乾燥を特定。研究デザイン：後方視的コホート研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/40966864/"},
{id:7,title:"口の中の保湿ケア",
ngSituation:"歯磨きと舌の清掃を丁寧に行った後、口の中がカラカラに乾燥していたが「清掃は終わったから大丈夫」と考えてそのまま終了した。",
options:["清掃が終わっていれば乾燥は問題にならない","口の中の乾燥は細菌が増える原因になるため、保湿をせずに終了したことがNG","乾燥していても水を飲めば解決するので特別な保湿は不要"],
answer:1,
explanation:"口の中が乾燥している状態（ドライマウス）は、細菌が急速に増殖する大きな原因です。健康な人の口の中では唾液が常に分泌されており、唾液には細菌を洗い流す「自浄作用」や、細菌の増殖を抑える「抗菌作用」があります。\n\nしかし高齢者では唾液の分泌量が減少していることが多く、口の中が乾燥しがちです。\n\n口腔のケアの最後には、以下の保湿ケアを行いましょう。\n①口腔保湿ジェル（口の中用の保湿クリーム）を、口の中の粘膜に薄く塗ります\n②唇が乾燥している場合はリップクリームやワセリンを塗ります\n③唾液腺（耳の下やあごの下にある唾液を作る組織）を外側からやさしくマッサージすると、唾液の分泌が促されます\n\nこれらの保湿ケアは「おまけ」ではなく、口腔のケアの重要な仕上げです。",
refs:"【出典】PMID:40966864 (2025) — 口腔乾燥が誤嚥性肺炎の独立リスク因子であることを特定。研究デザイン：後方視的コホート研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/40966864/\n\nPMID:41345604 — 唾液腺マッサージ＋口腔周囲筋運動の併用で嚥下機能向上が期待できる。研究デザイン：介入研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/41345604/"},
{id:8,title:"入れ歯の管理",
ngSituation:"夜のオーラルケア後、患者さんが「入れ歯を外すと不安」とおっしゃったので、入れ歯をつけたまま就寝してもらった。",
options:["本人が希望しているので入れ歯をつけたまま寝ても問題ない","就寝中の入れ歯装着は肺炎リスクを約2倍以上に高めるため、入れ歯をつけたまま寝かせたことがNG","入れ歯は1日中つけていた方が歯ぐきに良い"],
answer:1,
explanation:"就寝中に入れ歯をつけたままにすると、肺炎になるリスクが約2.3倍に高まることが大規模な研究で明らかにされています。\n\nなぜ夜間の入れ歯装着が危険なのでしょうか？\n①入れ歯の表面には目に見えない細菌の膜（バイオフィルム）が形成されます。就寝中は唾液の分泌が減るため、この細菌がどんどん増殖します。\n②就寝中は無意識に唾液を飲み込んでいますが（不顕性誤嚥＝むせのない誤嚥）、入れ歯表面の細菌が混ざった唾液を誤嚥すると肺炎の原因になります。\n③入れ歯をつけたまま寝ると、カビの一種（カンジダ菌）が増殖しやすくなります。\n\n就寝前には必ず入れ歯を外し、歯ブラシで入れ歯自体をしっかり磨いてから、水を入れた容器に浸けて保管してください。\n\n【災害時の例外的な対応について】\n原則として就寝時は義歯を外すことが推奨されますが、東日本大震災などの災害避難時においては状況が異なります。義歯を外したまま避難生活を送ることで、噛み合わせが失われ、嚥下機能や全身の活動性が著しく低下するケースが多数報告されました。そのため現在では、「しっかりとケアをして義歯と口腔内を清潔に保てるのであれば、災害時などいざという時に備えて義歯を装着したまま就寝する選択肢も可能性としては考慮すべき」という考え方も提唱されています。絶対にダメというわけではなく、状況に応じた判断が必要です。",
refs:"【出典】Iinuma T, et al. (2015) J Dent Res — 超高齢者524名の前向きコホートで、就寝中の義歯装着が肺炎発症リスクを約2.3倍に上昇させることを実証。研究デザイン：前向きコホート研究／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/25294364/\n\nMüller F (2015) J Dent Res — 夜間義歯装着を避けるべきと警告。研究デザイン：ナラティブレビュー／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/25589146/"},
{id:9,title:"洗口液（マウスウォッシュ）の使い方",
ngSituation:"時間がなかったので歯磨きを省略し、洗口液（マウスウォッシュ）だけで口をゆすいでオーラルケアを終わりにした。",
options:["洗口液だけでも十分に細菌を減らせるので問題ない","歯磨き（機械的清掃）を省略して洗口液だけに頼ったことがNG","洗口液の量が足りなかったことがNG"],
answer:1,
explanation:"洗口液（マウスウォッシュ）は、口の中の細菌を減らす効果がありますが、歯磨き（ブラッシング）の代わりにはなりません。\n\n口の中の汚れ（歯垢＝プラーク）は細菌がネバネバした膜（バイオフィルム）を作って歯や粘膜にしっかりくっついている状態です。この膜は洗口液だけでは溶かせません。歯ブラシで物理的にこすり取る「機械的清掃」が不可欠です。\n\n洗口液はあくまでも歯磨きの「補助」として使うものです。\n\n嚥下障害がある患者さんの場合は、洗口液を飲み込んでしまう危険があるため、使用を避けるか、スポンジブラシに少量含ませて拭き取る方法に変更してください。",
refs:"【出典】Sjögren P, et al. (2008) J Am Geriatr Soc — 機械的口腔清掃が肺炎予防に一貫した効果を示す一方、化学的薬剤単独では効果が不安定。研究デザイン：系統的レビュー／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/18691280/\n\nEl-Rabbany M, et al. (2018) Cochrane Review — 口腔のケア介入による肺炎予防効果を評価。研究デザイン：系統的レビュー（RCT4件）／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/30264525/"},
{id:10,title:"口腔のケアの回数",
ngSituation:"日勤帯が忙しく、口腔のケアは1日1回（朝だけ）しか行えなかった。",
options:["1日1回でも丁寧に磨けば十分である","口腔のケアは最低でも1日2回以上行うべきであり、1回だけでは不十分なためNG","口腔のケアは週に数回で十分なので、毎日1回でもやりすぎである"],
answer:1,
explanation:"口腔のケアは最低でも1日2回以上行うことが、多くのガイドラインで推奨されています。理想的には毎食後＋就寝前の計3～4回が望ましいです。\n\nなぜ1日1回では不十分なのでしょうか？\n①口の中の細菌は、歯磨きで一時的に減っても、約8～12時間で元の量に戻るといわれています。\n②特に就寝中は唾液の分泌が減り、細菌が最も増殖しやすい時間帯です。就寝前のオーラルケアは非常に重要です。\n③脳卒中で入院した患者さんでは、発症後48時間以内から1日2回の口腔のケアを開始することで、嚥下機能と口腔状態が改善したという研究結果もあります。\n\n「忙しくて全部できない」という場合でも、最低限「朝と就寝前」の2回は確保するよう心がけてください。",
refs:"【出典】Yoneyama T, et al. (2002) J Am Geriatr Soc — 毎食後の歯磨き＋週1回の専門ケアで肺炎が有意に減少。研究デザイン：RCT／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/11943036/\n\nPMC 2023 Best Practice Protocol (PMC9944467) — 1日2回以上の口腔のケアを複数ガイドラインが推奨。研究デザイン：ガイドライン統合プロトコル／エビデンス確実性：高\nURL: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9944467/"},
{id:11,title:"飲み込みの確認（嚥下スクリーニング）",
ngSituation:"新しく入院してきた脳卒中の患者さんに対し、飲み込みの機能を確認せずに「まず口をきれいにしましょう」と水を含ませてブラッシングを開始した。",
options:["口腔のケアには嚥下の確認は不要である","飲み込みの機能（嚥下機能）を確認しないまま水を使った口腔のケアを始めたことがNG","脳卒中でも口腔のケアに支障はないので確認は不要"],
answer:1,
explanation:"脳卒中の患者さんでは、約50～70％に嚥下障害（飲み込みの障害）が起こるとされています。\n\nしかも、脳卒中患者さんの中には「むせ」の反射が起こらないまま誤嚥してしまう方がいます。これを「不顕性誤嚥（ふけんせいごえん）」または「サイレントアスピレーション」といい、見た目にはわからないため非常に危険です。\n\n口腔のケアでも水を使えば誤嚥のリスクがあります。そのため、オーラルケアを始める前に、必ず嚥下機能を確認してください。\n\n嚥下障害が疑われる場合は、水を使わない口腔のケア（吸引やスポンジブラシによる拭き取り）に切り替え、言語聴覚士（ST）や医師に報告・相談してください。",
refs:"【出典】Dziewas R, et al. (2021) Eur Stroke J (ESO/ESSDガイドライン) — すべての脳卒中患者に対して嚥下スクリーニングを行うことを強く推奨。研究デザイン：ガイドライン（GRADE法に基づく系統的レビュー＋メタ分析）／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/34746431/\n\nAHRQ (2024) Making Healthcare Safer IV — 嚥下スクリーニングがAHA/ASA Class I推奨。研究デザイン：迅速レビュー（18研究統合）／エビデンス確実性：高\nURL: https://scholar.google.com/scholar?q=AHRQ+Making+Healthcare+Safer+IV+dysphagia+screening"},
{id:12,title:"麻痺がある患者さんへの配慮",
ngSituation:"右半身に麻痺がある脳卒中の患者さんの歯磨きをした後、左側（麻痺のない側）だけをきれいにして「磨き残しはなさそうだ」と終了した。",
options:["麻痺のない側をしっかり磨けていれば問題ない","麻痺がある側（右側）の口の中には食べかすや汚れがたまりやすいため、麻痺側を重点的に確認しないまま終了したことがNG","麻痺側は触ると痛がるので避けた方がよい"],
answer:1,
explanation:"麻痺がある患者さんでは、麻痺側の口の中（ほほの内側や歯と歯ぐきの境目）に食べかすや汚れがたまりやすいという特徴があります。\n\n①麻痺側のほほや舌が動きにくいため、食べ物を自分で押し出す「自浄作用」が働きません\n②麻痺側のほほの内側に食べかすが「ポケット」のようにたまりやすくなります\n③感覚が鈍くなっているため、ご本人が汚れに気づかないことが多いです\n\n口腔のケアでは、麻痺側こそ重点的に観察・清掃してください。",
refs:"【出典】Kwok C, et al. (2015) J Oral Rehabil — 片麻痺・協調運動障害・認知機能低下が口腔のケアを困難にする脳卒中特有の課題をまとめたスコーピングレビュー。研究デザイン：スコーピングレビュー／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/25243878/\n\nPrendergast V, et al. (2018) Eur Stroke J — 脳卒中後の口腔のケアが軽視されがちで窒息リスクへの不安が大きいと指摘。研究デザイン：ナラティブレビュー／エビデンス確実性：低\nURL: https://scholar.google.com/scholar?q=Prendergast+Eur+Stroke+J+2018+oral+care"},
{id:13,title:"オーラルケア後の確認",
ngSituation:"歯磨きとスポンジブラシでの清掃を終えたので、患者さんの口の中をもう一度確認せずに後片付けを始めた。",
options:["清掃が終われば確認は不要である","口腔のケア後に口の中をもう一度確認せず、磨き残しや出血、粘膜の傷がないかをチェックしなかったことがNG","後片付けを優先するのは時間管理として正しい"],
answer:1,
explanation:"口腔のケアの後には、必ずもう一度口の中を確認してください。確認すべきポイントは以下の通りです。\n\n①磨き残し：歯と歯ぐきの境目、舌、ほほの内側に汚れが残っていないか\n②出血：歯ぐきから出血していないか\n③粘膜の傷：スポンジブラシや歯ブラシで口の中の粘膜を傷つけていないか\n④水分の残留：口の奥に水分がたまっていないか。たまっている場合は吸引する\n\n特に重要なのは④の水分残留の確認です。ケア後は声を出してもらい、声が「ゴロゴロ」と湿った感じ（湿性嗄声）になっていないかを聴くことも大切です。\n\nケア後30分程度はベッドの頭側を挙げた状態を維持することも推奨されます。",
refs:"【出典】Huang YT, et al. (2025) PMC12123995 — 口腔のケアプロトコルの4段階（準備→評価→口腔清掃→舌清掃）を提示。研究デザイン：パイロットRCT／エビデンス確実性：低\nURL: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC12123995/"},
{id:14,title:"オーラルケアの知識と教育",
ngSituation:"先輩から口腔のケアの方法を一度教わったが、その後は自己流でケアを続けていた。新しい知見や正しい方法を学ぶ機会がないまま数年が経過した。",
options:["一度教わった方法をずっと続けるのが一番安定している","口腔のケアの技術は進歩しており、自己流のまま更新しないことで不適切なケアになっている可能性があるためNG","口腔のケアは経験が最も大切で、教育は必要ない"],
answer:1,
explanation:"口腔のケアの方法は研究の進歩とともに常にアップデートされています。自己流のケアを続けていると、知らないうちに患者さんに不利益を与えている可能性があります。\n\n研究では、介護職員への教育だけでなく、歯科衛生士による実地指導を組み合わせた場合に、口腔のケアの質が最も向上し、その効果が長く持続することが報告されています。\n\n日々のケアで困ったことがあれば、歯科衛生士や言語聴覚士に積極的に相談してください。",
refs:"【出典】Taminato M, et al. (2023) PMC10662425 — 歯科衛生士による教育＋実地指導の組み合わせが最も効果的。研究デザイン：系統的レビュー／エビデンス確実性：高\nURL: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10662425/\n\nFerreira S, et al. (2025) JBI Evid Implement — 監査とフィードバックで口腔衛生プロトコル遵守率が劇的に改善。研究デザイン：ベストプラクティス導入研究／エビデンス確実性：低\nURL: https://scholar.google.com/scholar?q=Ferreira+S+JBI+Evid+Implement+2025"},
{id:15,title:"歯科専門職との連携",
ngSituation:"施設入所中の高齢者に対し、看護師による毎日の口腔のケアだけで十分だと考え、歯科医師や歯科衛生士による定期的なチェックは特に依頼しなかった。",
options:["毎日の口腔のケアをしっかり行えば専門職の介入は不要である","日常の口腔のケアに加えて、歯科専門職による定期的な介入（専門的オーラルケア）を組み合わせないと肺炎予防効果が不十分なためNG","歯科専門職の介入は歯が痛い時だけで十分である"],
answer:1,
explanation:"日常の口腔のケアはもちろん大切ですが、それだけでは不十分です。歯科衛生士などの歯科専門職が定期的に口の中をチェックし、専門的な清掃を行う「専門的口腔健康管理（POHC）」を組み合わせることで、肺炎予防効果が大きく高まることが研究で証明されています。\n\n代表的な研究では、「毎食後の歯磨き」＋「週1回の歯科専門職による専門ケア」を組み合わせた施設入所者は、肺炎の発症率と肺炎による死亡率の両方が有意に低下しました。",
refs:"【出典】Yoneyama T, et al. (2002) J Am Geriatr Soc — 毎食後のブラッシング＋週1回の専門ケアで肺炎が有意に減少（RR 1.67）。研究デザイン：RCT／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/11943036/\n\nAdachi M, et al. (2007) Int J Dent Hyg — 歯科衛生士による24ヶ月のPOHC介入で致死的誤嚥性肺炎が有意に減少。研究デザイン：RCT／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/17692038/\n\nTaminato M, et al. (2023) PMC10662425 — 週1回の歯科衛生士介入が最も強いエビデンス（OR 9.33）。研究デザイン：系統的レビュー／エビデンス確実性：高\nURL: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10662425/"}
];

/* ============================================================
   ベテラン編 15問（超難問）
   ============================================================ */
const qA=[
{id:1,title:"口腔アセスメントの精度（極・難問）",
ngSituation:"誤嚥性肺炎の既往がある入所者に対し、ROAG（口腔アセスメントガイド）で口腔状態を評価した。スコアは「正常範囲」であったため、通常通りのケアプランを継続した。",
options:["ROAGで正常範囲であれば誤嚥性肺炎リスクは低いため問題ない","ROAGは口腔清掃状態や義歯の評価が粗く、誤嚥性肺炎既往者にはOHATなどより精密なツールを併用すべきなのでNG","ROAGよりもGUSSを使うべきなのでNG"],
answer:1,
explanation:"ROAG（Revised Oral Assessment Guide）は、声、口唇、粘膜、舌、歯肉、唾液、歯・義歯の状態などを簡便に評価するツールとして広く使われていますが、「口腔清掃状態」の評価が粗く、残存歯と義歯を個別に評価する項目がないという限界があります。\n\nFuruyaらの研究では、OHAT（Oral Health Assessment Tool）はROAGと比較して口腔清掃状態の評価がより精密で、残存歯と義歯を別個の項目として評価するため、嚥下の「口腔期」に関連する問題をより正確に検出できるとされています。ちなみにOHATはオーストラリアで開発された後、その信頼性と妥当性の高さから、現在では北米、ヨーロッパ、アジアなど世界中で翻訳され、高齢者の標準的な口腔アセスメントツールとして国際的に広く普及・使用されています。\n\n誤嚥性肺炎の既往がある高リスク患者に対しては、初回の口腔アセスメントはOHATなどの精密なツールを用いることが求められます。\n\n一方で、日々の口腔衛生管理を実施する直前のアセスメントとしては、毎回フル評価を行うのではなく、以下の項目を迅速に確認することが極めて重要です。\n・口内炎など痛みの有無\n・動揺歯（グラグラしている歯）の有無\n・義歯が装着されているか\n\nこれらを日常的にチェックすることで、ケア中の痛みによる拒絶や、動揺歯の脱落・誤嚥といった重大な事故を防ぐことができます。",
refs:"【出典】Furuya J, et al. (2019) BMC Infect Dis — OHATが誤嚥性肺炎のリスク識別において高い診断精度を示した。研究デザイン：前向き観察研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/31805872/\n\nNoguchi S, et al. (2018) Gerodontology — ROAGが高齢肺炎患者の誤嚥リスク予測に有用。研究デザイン：後方視的観察研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/30132974/"},
{id:2,title:"ベッド挙上角度の使い分け（極・難問）",
ngSituation:"脳卒中急性期（発症24時間以内）で頭蓋内圧亢進が疑われる患者に対し、口腔のケアのためにベッドを45度まで挙上して実施した。",
options:["脳卒中急性期の頭蓋内圧亢進リスクがある場合、45度は脳灌流圧低下を招くため30度に留めるべきなのでNG","誤嚥予防のためには45度挙上が最善であり問題ない","急性期は口腔のケア自体を避けるべきなのでNG"],
answer:0,
explanation:"ベッド挙上は誤嚥予防の基本ですが、脳卒中急性期では「誤嚥予防」と「脳灌流圧の維持」という相反する2つの目標のバランスを取る必要があります。\n\n頭蓋内圧が亢進している患者では、ベッドの頭部を高く上げすぎると脳への血流（灌流圧）が低下して二次的な脳損傷を引き起こすリスクがあります。神経集中治療の分野では、脳卒中急性期の頭蓋内圧亢進リスクがある患者にはベッド挙上は30度が上限とされています。\n\n一方、45度挙上は誤嚥予防にはより効果的です（メタ分析でOR 0.48）。しかし同時に褥瘡リスクが1.95倍に上昇するデータもあります。\n\n患者の病態に応じて30度～45度の範囲で個別に判断する必要があります。",
refs:"【出典】AHRQ HOB Elevation Review — 30-45度を4大ガイドラインが推奨。研究デザイン：系統的レビュー／エビデンス確実性：高\nURL: https://scholar.google.com/scholar?q=AHRQ+HOB+Elevation+Review\n\nPMC11411915 (2024) — 45度挙上でVAPリスク低下だが褥瘡リスク上昇。研究デザイン：系統的レビュー＋メタ分析（RCT6件）／エビデンス確実性：高\nURL: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC11411915/"},
{id:3,title:"側臥位の向きの判断（極・難問）",
ngSituation:"右片麻痺の脳卒中患者に対し、口腔のケア中の誤嚥予防のため「健側（左側）を下にした側臥位」で口腔のケアを行った。",
options:["健側を下にすれば安全にオーラルケアができるので問題ない","側臥位の向きはどちらでも誤嚥リスクは変わらない","口腔のケア中は「麻痺側（右側）を下にした側臥位」にすべきであり、健側を下にすると麻痺側の口腔内が上方になり重力で汚染物が咽頭に流入する危険があるためNG"],
answer:2,
explanation:"口腔のケア中に水分や汚染物が発生する場合、その汚染物が「どこに流れるか」を重力の方向で考える必要があります。麻痺側（右側）を下にした側臥位をとると、口腔のケア中に出る水分や汚れは下方にある麻痺側の頬に向かって流れ、口角から外に排出されやすくなります。\n\n一方、健側（左側）を下にすると、麻痺側の口腔内が上方に位置するため、ブラッシング中に落ちた汚染物が重力で咽頭方向に流入し、感覚が鈍い麻痺側の梨状陥凹にたまって誤嚥するリスクが高まります。\n\nただし食事時の頸部回旋法（Logemann）では逆に「麻痺側を向く」ことで健側を通して安全に飲み込ませます。目的によって体位が変わる点が重要です。",
refs:"【出典】PMID:30760684 — 完全側臥位法が重度嚥下障害高齢者の誤嚥を物理的に防止。研究デザイン：症例報告／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/30760684/\n\nMetheny NA (2008/2018) — 嚥下障害患者の体位調整推奨。研究デザイン：ガイドライン／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/18496117/"},
{id:4,title:"吸引の判断と不顕性誤嚥（極・難問）",
ngSituation:"嚥下障害のある患者に対し、「ゼロ含水オーラルケア（水を使わない方法）」を実施した。ケア中にむせがなかったため、吸引は行わずに終了した。",
options:["不顕性誤嚥は嚥下障害患者の約40-70%で生じるとされ、むせがないことが安全の証拠にはならない。ゼロ含水でも唾液・粘膜のカスの咽頭流入リスクがあり、ケア後の吸引・確認を省略したことがNG","むせがなければ誤嚥は起きていないので問題ない","ゼロ含水法では水を使わないため吸引は不要"],
answer:0,
explanation:"「むせない＝誤嚥していない」は臨床現場で最も危険な誤解の一つです。不顕性誤嚥（サイレントアスピレーション）は嚥下障害患者の約40～70%で生じるとされ、咳反射が障害されているために気管に異物が入ってもむせが起こりません。\n\n「ゼロ含水オーラルケア」は水の誤嚥リスクを排除する優れた方法ですが、ブラッシングで剥がれた歯垢・舌苔・剥離上皮や、ケアにより分泌促進された唾液が咽頭に流入するリスクは依然として存在します。\n\nゼロ含水法であっても、ケア後の吸引・口腔内確認・湿性嗄声の有無の確認は必須です。",
refs:"【出典】Dziewas R, et al. (2021) ESO/ESSDガイドライン — 不顕性誤嚥の高頻度を指摘。研究デザイン：ガイドライン（GRADEメタ分析）／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/34746431/\n\nPMID:40966864 (2025) — 剥離上皮・唾液貯留が誤嚥性肺炎の独立リスク因子。研究デザイン：後方視的コホート研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/40966864/"},
{id:5,title:"ブラッシングにおける毛先の当て方と適応（極・難問）",
ngSituation:"パーキンソン病の振戦がある患者に対し、「歯周病予防にはこの磨き方が良い」と特定の方法の形だけにこだわり、歯の表面に毛先がしっかり当たっていない状態で、手用歯ブラシでのブラッシングを指導した。",
options:["特定の方法に沿っていれば毛先が当たっていなくても効果はある","特定の磨き方の名前よりも、各歯の表面に対して毛先がしっかり当たる角度を作り、細かく振動させることが重要である。振戦によりそのコントロールが困難なため、電動歯ブラシ（音波式）を検討すべきなのでNG","振戦がある場合はブラッシング自体を行わず洗口液のみにすべきなのでNG"],
answer:1,
explanation:"「バス法」や「スクラビング法」といった磨き方の「名前」が重要なのではありません。\n\n歯を磨く際に最も重要な基本は、**「それぞれの歯の表面（あるいは歯と歯ぐきの境目）に対して、歯ブラシの毛先がしっかりと当たる角度を作り、細かく振動させるように磨くこと」**です。各歯の生え方や並び方に合わせて、毛先が当たる角度を常に意識するという考え方が不可欠です。\n\nパーキンソン病の振戦がある患者などでは、手用歯ブラシでこの「毛先を適切に当てて細かく振動させる」という精密なコントロールを持続することが極めて困難です。そのため、無理に手用歯ブラシでの特定の磨き方にこだわるのではなく、使用者が歯面に軽く当てるだけで効果的な振動が得られる電動歯ブラシ（特に音波式）への変更を検討すべきです。",
refs:"【出典】Dai et al. (2017) — 電動歯ブラシ＋CHX洗口が手用歯ブラシより有意にプラーク減少。研究デザイン：RCT／エビデンス確実性：高\nURL: https://scholar.google.com/scholar?q=Dai+electric+toothbrush+chlorhexidine+2017\n\nCochrane Review: Brady et al. (2021) — 脳卒中患者への電動歯ブラシの検討を推奨。研究デザイン：系統的レビュー／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/33400821/"},
{id:6,title:"舌苔評価の深層判断（極・難問）",
ngSituation:"高齢入所者の舌苔を清掃した際、舌の表面の小さな突起（舌乳頭）が萎縮して舌全体が赤くツルツルしていた。「舌苔が少なくてきれいだ」と判断し、特に報告せずに終了した。",
options:["舌苔が少ないのは口腔内がきれいな証拠なので問題ない","舌がツルツルしている場合は加齢によるもので心配不要","舌乳頭の萎縮と平滑化は鉄・ビタミンB群欠乏やカンジダ症などの病的サインであり、「きれい」と判断して報告しなかったことがNG"],
answer:2,
explanation:"舌苔が「少ない」ことと舌が「健康」であることは全く異なります。舌乳頭が萎縮して舌全体がツルツルと赤く光って見える状態は「萎縮性舌炎」と呼ばれ、以下の病態を示唆する重要な臨床サインです。\n\n①鉄欠乏性貧血 ②ビタミンB12・葉酸欠乏（Hunter舌炎） ③カンジダ症 ④亜鉛欠乏\n\n高齢者、特に経管栄養の患者さんではこれらの栄養欠乏が高頻度で生じます。異常があれば歯科医師または主治医に報告して栄養評価の必要性を検討してもらうことが重要です。",
refs:"【出典】PMID:40966864 (2025) — 舌苔・剥離上皮が誤嚥性肺炎の独立リスク因子。研究デザイン：後方視的コホート研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/40966864/\n\nFuruya J, et al. (2019) BMC Infect Dis — OHATの舌評価項目が肺炎リスク識別に重要。研究デザイン：前向き観察研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/31805872/"},
{id:7,title:"口腔乾燥の神経機序と保湿の限界（極・難問）",
ngSituation:"脳卒中後の重度嚥下障害患者に市販の口腔保湿ジェルを塗布したが、2時間後に口腔内が再び乾燥していた。「保湿剤の量が足りなかった」と考え、次回はより多量に塗布する計画を立てた。",
options:["唾液分泌低下の原因（薬剤性・神経障害性・脱水など）の鑑別と原因への対処を検討せず、対症療法の量を増やすだけの対応がNG","保湿ジェルの量を増やせば乾燥は改善するので問題ない","保湿ジェルは効果がないので使用を中止すべき"],
answer:0,
explanation:"口腔乾燥の対応として保湿ジェルの塗布は重要ですが、根本原因を考慮せず「量を増やす」だけのアプローチは不十分です。\n\n口腔乾燥の原因は多岐にわたります。\n①薬剤性：抗コリン薬、抗ヒスタミン薬、抗うつ薬、利尿薬など\n②神経障害性：脳卒中による顔面神経（VII）・舌咽神経（IX）障害\n③脱水 ④口呼吸\n\n正しいアプローチは原因の鑑別・対処を行った上で保湿ジェル・唾液腺マッサージを補助的に併用することです。保湿ジェルを多量に塗布すると粘稠な塊となって咽頭に流入し誤嚥の原因になる可能性もあります。",
refs:"【出典】PMID:41345604 — 唾液腺マッサージ＋口腔周囲筋運動で嚥下機能向上。研究デザイン：介入研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/41345604/\n\nPMID:40966864 (2025) — 口腔乾燥が誤嚥性肺炎の独立リスク因子。研究デザイン：コホート研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/40966864/"},
{id:8,title:"義歯装着と嚥下機能の関係（極・難問）",
ngSituation:"残存歯が少ない高齢者の部分入れ歯が合わなくなってきたが、「入れ歯は肺炎リスクを高めるから外したままの方がよい」と判断し、歯科への相談をしなかった。",
options:["義歯は肺炎リスクを高めるので外したままでよい","誤嚥リスクがある患者において、義歯非装着はかえって誤嚥性肺炎の発症リスクを高めるため、不適合のまま放置するのも外したままにするのもNG","義歯の適合は看護の範囲外なので報告不要"],
answer:1,
explanation:"義歯と肺炎リスクの関係は「夜間装着は危険」という知識だけでは不十分です。Kumagaiら（2019）の研究では、誤嚥リスクがあり義歯を装着していない群は、誤嚥リスクがない群と比較して誤嚥性肺炎の発症リスクが7.3倍高いことが示されました。これは義歯による咬合の回復が嚥下機能を補助するためと考えられます。\n\n義歯管理の原則：①日中は適合の良い義歯を装着 ②夜間は外して洗浄・保管 ③不適合の義歯は速やかに歯科へ相談\n\n【災害時の例外的な対応について】\n原則として就寝時は義歯を外すことが推奨されますが、東日本大震災などの災害避難時においては状況が異なります。義歯を外したまま避難生活を送ることで、噛み合わせが失われ、嚥下機能や全身の活動性が著しく低下するケースが報告されました。そのため現在では、「しっかりとケアをして義歯と口腔内を清潔に保てるのであれば、災害時などいざという時に備えて義歯を装着したまま就寝する選択肢も可能性としては考慮すべき」という考え方も提唱されています。絶対にダメというわけではなく、状況に応じた判断が必要です。",
refs:"【出典】Kumagai S, et al. (2019) IJERPH — 誤嚥リスクあり・義歯非装着で肺炎リスク7.3倍。研究デザイン：前向きコホート研究／エビデンス確実性：低\nURL: https://www.mdpi.com/1660-4601/16/4/554\n\nIinuma T, et al. (2015) J Dent Res — 夜間装着で肺炎リスク約2.3倍。研究デザイン：前向きコホート研究／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/25294364/"},
{id:9,title:"疼痛コントロールと薬剤の適応（極・難問）",
ngSituation:"口内炎がひどく痛みが強い嚥下障害患者の口腔のケアにおいて、痛みを我慢させながら通常のブラッシングを行い、さらに強力な殺菌を求めてクロルヘキシジン（CHX）などの洗口液を使用しようとした。",
options:["痛みが強くても殺菌のためにはCHXを使うべきである","CHXは日本では使えないが、痛みが強い場合はケアを数日間完全に中止すべき","日本ではCHXは口腔粘膜への使用が禁忌であること、また口内炎の痛みが強い場合は、痛みを我慢させるのではなくキシロカイン等で疼痛コントロールを行いながらケアする視点が欠けているためNG"],
answer:2,
explanation:"まず、大前提として**日本ではクロルヘキシジン（CHX）は、アナフィラキシーショック等の重大な副作用のリスクから、口腔粘膜への使用（うがい薬などとしての使用）は原則禁忌**とされており、使用できません。（※ただし、海外においてはCHXはVAP予防などの重要な洗口液・うがい薬として広く役立っているという背景は知っておく必要があります）\n\n次に重要なのが「疼痛コントロール」の視点です。口内炎がひどく痛みが強い患者に対し、痛みを我慢させて無理にケアを行うのは不適切です。\n\n痛みが強い場合は、医師の指示のもとで**キシロカイン（局所麻酔薬）を薄めた液やスプレーなどを使用し、痛みを取り除きながら（コントロールしながら）安全に口腔衛生管理を行う**というアプローチへの切り替えが必要です。",
refs:"【出典】Cochrane Review: Shi Z, et al. (2013) — CHX＋歯ブラシがVAP予防に最も効果的。研究デザイン：系統的レビュー／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/23934834/\n\nSjögren P, et al. (2008) — 化学的薬剤単独では効果が不安定。研究デザイン：系統的レビュー／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/18691280/"},
{id:10,title:"食前オーラルケアの意義（極・難問）",
ngSituation:"嚥下障害のある患者に対し、食事の後に口腔のケアを行った。食前のオーラルケアは「食事の前に磨いても意味がない」と考え、実施しなかった。",
options:["食前のオーラルケアを実施しなかったことがNG。食前に口の中の細菌を減らすことで、万一の誤嚥時に肺に入る菌量を低減し、肺炎の重症度を軽減できる","食前に口腔のケアを行う意味はないので食後だけで問題ない","食前にケアをすると唾液が減って飲み込みにくくなるので避けるべき"],
answer:0,
explanation:"口腔のケアの「食前」と「食後」では目的が全く異なります。\n\n【食前】口の中の細菌数を事前に減らし、食事中に万が一誤嚥しても肺に入る菌量を最小限にする「予防的除菌」\n【食後】食べかすを除去し細菌の栄養源を断つ「菌の増殖防止」\n\n経管栄養で口から食べていない患者さんでも、口腔内には唾液由来の細菌が常に増殖しています。むしろ口から食べないことで自浄作用が低下するため、経口摂取患者以上に念入りな口腔のケアが必要です。",
refs:"【出典】PMID:32748375 — 経管栄養患者は自浄作用低下で口腔内細菌が増殖しやすい。研究デザイン：ナラティブレビュー／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/32748375/\n\nYoneyama T, et al. (2002) — 毎食後のブラッシングで肺炎減少。研究デザイン：RCT／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/11943036/"},
{id:11,title:"NPOパラドックスと口腔のケア（極・難問）",
ngSituation:"脳卒中後に重度の嚥下障害と診断された患者。絶飲食（NPO）＋経鼻胃管で栄養投与中。「口から何も食べていないので口腔のケアは最低限でよい」と判断し、1日1回の簡単な拭き取りのみ実施した。",
options:["NPOの患者は口から食べていないので口腔のケアは最低限でよい","NPO中は口腔のケア自体が禁忌であるためNG","NPO患者こそ口腔内細菌が増殖しやすく、唾液の不顕性誤嚥による肺炎リスクが極めて高いため、経口摂取患者以上に徹底した口腔のケアが必要なのでNG"],
answer:2,
explanation:"「NPOパラドックス」と呼ばれる極めて重要な概念です。Ihrkeらの2025年の研究では、NPO群は食事制限なし群と比較して誤嚥性肺炎の発症率が約2.5倍高く、肺炎の多くは経口摂取開始「前」に発症していました。\n\nNPOでも唾液は常に分泌されており、不顕性誤嚥により細菌を含んだ唾液が気管に流入します。さらに口から食べないことで自浄作用が低下し、病原性の高い細菌が爆発的に増殖します。\n\n【⚠️極めて重要なポイント：剥離上皮による窒息リスク】\n食事を摂っておらず口の中が乾燥している患者では、古くなった粘膜が剥がれ落ちた「剥離上皮（はくりじょうひ）」が分厚い塊となって付着しやすくなります。**この剥離上皮の塊が咽頭（のどの奥）に落ち込むと、気道を塞いで致死的な「窒息」を引き起こす危険性があります。**\n\nNPO中で口腔乾燥があり、SpO2（血中酸素飽和度）が下がっているなどの兆候が見られた場合は、咽頭の奥まで剥離上皮の塊が落ち込んでいないかをしっかりと確認し、慎重に対処（吸引・除去）することが極めて重要です。",
refs:"【出典】Ihrke M, et al. (2025) Sci Rep — NPO患者は2.5倍肺炎リスクが高い（NPOパラドックス）。研究デザイン：二施設後方視的コホート研究／エビデンス確実性：低\nURL: https://scholar.google.com/scholar?q=Ihrke+M+Sci+Rep+NPO+paradox+2025\n\nPMID:32748375 — 経管栄養患者は口腔内細菌が増殖しやすい。研究デザイン：ナラティブレビュー／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/32748375/"},
{id:12,title:"開口拒否・咬反射への対応（極・難問）",
ngSituation:"重度認知症の患者が口腔のケア時に口を開けてくれない。開口を促すため、金属製スプーンの柄を歯の間に差し込んでこじ開けようとした。",
options:["口を開けてもらうためには多少の力は仕方がない","金属製の硬い物で歯をこじ開けると歯の破折・粘膜損傷・咬反射の誘発による重大事故のリスクがあり、この方法は絶対に行ってはならないためNG","開口拒否がある場合は口腔のケア自体を中止すべきなのでNG"],
answer:1,
explanation:"認知症患者の開口拒否は多くの場合「理解できない」「怖い」という認知機能障害に基づく防御反応です。金属製の硬い物で歯をこじ開ける行為は、歯の破折、口腔粘膜の裂傷、咬反射の誘発（噛反射：強く噛み締める原始反射で、指や器具を噛まれて抜けなくなる）という重大なリスクがあります。\n\n正しいアプローチ：①穏やかな声かけ ②口の周りへのやさしい触覚入力 ③Kポイント刺激法（上顎結節の軽い圧迫で反射的開口を促す） ④タイミングの調整 ⑤歯科専門職への相談",
refs:"【出典】Kwok C, et al. (2015) J Oral Rehabil — 認知機能低下による口腔のケアの困難さをまとめたスコーピングレビュー。研究デザイン：スコーピングレビュー／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/25243878/\n\nChebib N, et al. (2020) Gerodontology — 依存患者への口腔のケア実施率が低い実態と教育改善の提言。研究デザイン：横断調査研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/31697424/"},
{id:13,title:"ケア後の頸部聴診法（極・難問）",

options:["口腔のケア後の湿性嗄声は咽頭に水分や汚染物が残留している重要なサインであり、追加対応をしなかったことがNG","声質には個人差があるので湿性嗄声に聞こえても問題ない","湿性嗄声は嚥下障害とは無関係である"],
answer:0,
explanation:"口腔のケア後の湿性嗄声（ゴロゴロと湿った感じの声）は、声帯の上に水分や分泌物が残留していることを示す重要な臨床サインです。\n\n対応手順：①空嚥下を1～2回促す ②改善しなければ咳払いを促す ③それでも改善しなければ吸引 ④再度発声して確認 ⑤繰り返す場合はSTや医師に報告しVE/VFの検討\n\n頸部聴診法は聴診器を甲状軟骨の外側に当て嚥下前後の呼吸音変化を聴取する方法であり、看護師が日常的に行える簡便なスクリーニング技法です。",
refs:"【出典】Dziewas R, et al. (2021) ESO/ESSDガイドライン — 嚥下後の残留評価の重要性。研究デザイン：ガイドライン（GRADE法）／エビデンス確実性：高\nURL: https://pubmed.ncbi.nlm.nih.gov/34746431/"},

options:["口腔のケアだけを徹底すれば肺炎は十分に予防できる","嚥下スクリーニングと体位管理は看護の範囲外なので含める必要はない","口腔のケア・嚥下スクリーニング・体位管理を個別ではなく『ケアバンドル（セット）』として同時に導入しなければ肺炎予防効果が最大化しないためNG"],

explanation:"誤嚥性肺炎の予防は単一の介入では効果が限定的であり、複数の介入を「ケアバンドル」として同時に導入することで最大の効果が得られます。\n\n3つの柱：①口腔のケア（1日2回以上のブラッシング、舌清掃、保湿、定期的な専門的口腔健康管理）②嚥下スクリーニングの早期実施（24時間以内）③体位管理（ベッド挙上30-45度）\n\nこの3つは「別々のチームの仕事」ではなく看護師が中心となって統合的にマネジメントすべきものです。",
refs:"【出典】PMID:35953801 — ケアバンドルとしての同時導入が肺炎予防に最も有効。研究デザイン：介入研究／エビデンス確実性：低\nURL: https://pubmed.ncbi.nlm.nih.gov/35953801/\n\nAHRQ (2024) Making Healthcare Safer IV — 口腔のケア・嚥下スクリーニング・予防バンドルの3カテゴリーを統合評価。研究デザイン：迅速レビュー（18研究）／エビデンス確実性：高\nURL: https://scholar.google.com/scholar?q=AHRQ+Making+Healthcare+Safer+IV+2024"},

<li>Dziewas R, et al. (2021) Eur Stroke J. 6(3):LXXXIX-CXV. <a href="https://pubmed.ncbi.nlm.nih.gov/34746431/" target="_blank" rel="noreferrer" className="text-blue-600 underline">PMID:34746431</a></li>
<li>Iinuma T, et al. (2015) J Dent Res. 94(3 Suppl):28S-36S. <a href="https://pubmed.ncbi.nlm.nih.gov/25294364/" target="_blank" rel="noreferrer" className="text-blue-600 underline">PMID:25294364</a></li>
<li>Kumagai S, et al. (2019) Int J Environ Res Public Health. 16(4):554. <a href="https://www.mdpi.com/1660-4601/16/4/554" target="_blank" rel="noreferrer" className="text-blue-600 underline">🔗 詳細リンク</a></li>

<li>El-Rabbany M, et al. (2018) Cochrane Database Syst Rev. <a href="https://pubmed.ncbi.nlm.nih.gov/30264525/" target="_blank" rel="noreferrer" className="text-blue-600 underline">PMID:30264525</a></li>
<li>AHRQ (2024) Making Healthcare Safer IV — NV-HAP prevention <a href="https://scholar.google.com/scholar?q=AHRQ+Making+Healthcare+Safer+IV+NV-HAP+prevention" target="_blank" rel="noreferrer" className="text-blue-600 underline">🔗 詳細リンク</a></li>
<li>Ihrke M, et al. (2025) Sci Rep. 15:34479 — NPO paradox <a href="https://scholar.google.com/scholar?q=Ihrke+M+Sci+Rep+NPO+paradox+2025" target="_blank" rel="noreferrer" className="text-blue-600 underline">🔗 詳細リンク</a></li>

</div>
<div className="bg-amber-50 p-4 rounded-lg mb-6 text-xs text-gray-600 border border-amber-200">

</div>
<button onClick={()=>{reset();setPage('cover')}} className={`w-full ${th.m} ${th.mh} text-white font-bold py-4 rounded-xl transition flex items-center justify-center gap-2`}><RotateCcw size={20}/>表紙に戻る</button>

}

/* ===== クイズ画面 ===== */
return(

<button onClick={()=>chTab('advanced')} className={`flex-1 py-3 px-4 font-bold text-sm md:text-base transition-colors flex justify-center items-center gap-2 ${tab==='advanced'?'bg-white text-rose-700 border-t-4 border-t-rose-700':'text-gray-500 hover:bg-gray-50 hover:text-rose-700 border-t-4 border-t-transparent'}`}>{tab==='advanced'&&<AlertCircle size={18}/>}ベテラン編(超難問)</button>
</div>
<div className={`${th.m} p-4 text-white`}>
<div className="flex justify-between items-center mb-2">
<div className="flex items-center gap-2">
{qi>0&&<button onClick={prev} className="bg-white/20 hover:bg-white/30 text-white rounded-full p-1 transition-colors" title="前の問題へ"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>}
<h1 className="font-bold text-lg">オーラルケア NG行動チェック</h1>
</div>
<div className={`${th.bd} px-3 py-1 rounded-full text-sm font-medium`}>Point {q.id}/{qs.length}</div>
</div>
<div className="w-full bg-black/20 h-1.5 rounded-full overflow-hidden"><div className="bg-white h-full transition-all duration-300 ease-out rounded-full" style={{width:`${pct}%`}}></div></div>
</div>
<div className="p-5 md:p-8 flex-grow">
<h2 className={`text-2xl font-bold ${th.tm} mb-3 pb-2 border-b-2 ${th.bl}`}>{q.title}</h2>
<div className="bg-gray-50 border border-gray-200 rounded-xl p-5 mb-6 shadow-sm">
<div className="flex items-center gap-2 text-gray-700 font-bold mb-3"><AlertCircle size={24} className={tab==='advanced'?"text-rose-600":"text-sky-600"}/><span>こんな状況、どこがNG？</span></div>
<p className="text-gray-800 text-lg leading-relaxed font-medium">{q.ngSituation}</p>
</div>
<div className="space-y-3">
{q.options.map((o,i)=>{
const hbc=tab==='advanced'?'hover:border-rose-500 hover:bg-rose-50':'hover:border-sky-500 hover:bg-sky-50';
let bs=`bg-white border-2 border-gray-200 ${hbc} text-gray-700`;
if(show){if(i===q.answer)bs="bg-green-100 border-2 border-green-500 text-green-800 font-bold shadow-sm";else if(i===sel)bs="bg-red-100 border-2 border-red-500 text-red-800";else bs="bg-gray-50 border-2 border-gray-200 text-gray-400 opacity-50"}
return(<button key={i} disabled={show} onClick={()=>pick(i)} className={`w-full text-left p-4 rounded-xl transition-all duration-200 flex items-start gap-3 ${bs}`}>
<div className="mt-0.5 shrink-0">{show&&i===q.answer&&<CheckCircle2 className="text-green-600" size={20}/>}{show&&i===sel&&i!==q.answer&&<XCircle className="text-red-600" size={20}/>}{!show&&<div className="w-5 h-5 rounded-full border-2 border-gray-300"></div>}</div>
<span className="text-lg leading-snug">{o}</span></button>)})}
</div>
{show&&<div className={`mt-6 p-5 rounded-xl anim-in ${sel===q.answer?'bg-green-50 border border-green-200':'bg-orange-50 border border-orange-200'}`}>
<div className="flex items-center gap-2 mb-3 border-b border-gray-200/50 pb-2">
{sel===q.answer?<><CheckCircle2 className="text-green-600"/><span className="font-bold text-green-800 text-lg">正解！</span></>:<><Info className="text-orange-600"/><span className="font-bold text-orange-800 text-lg">解説</span></>}
</div>
<p className="text-gray-800 leading-relaxed text-md font-medium whitespace-pre-wrap">{q.explanation}</p>
<button onClick={()=>setShowRefs(!showRefs)} className="mt-4 text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1 font-bold"><Book size={16}/>{showRefs?'出典を閉じる':'出典・エビデンスを表示'}</button>
{showRefs&&<div className="mt-2 p-3 bg-blue-50 rounded-lg text-sm whitespace-pre-wrap border border-blue-200 anim-in">
<TextWithLinks text={q.refs} />
<p className="mt-2 text-xs text-gray-500 italic">※ エビデンス確実性（高／低）はGRADEアプローチに厳密に準拠しておらず、参考程度の表記です。</p>
</div>}
</div>}
</div>
{show&&<div className="bg-gray-50 p-4 border-t border-gray-200">
<div className="flex flex-col md:flex-row gap-3">
{qi>0&&<button onClick={prev} className="w-full md:w-auto bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-xl transition flex justify-center items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>前へ</button>}
<button onClick={retry} className="w-full md:flex-1 bg-white hover:bg-gray-100 text-gray-700 font-bold py-3 rounded-xl border-2 border-gray-300 transition flex justify-center items-center gap-2"><RotateCcw size={18}/>問題に戻る</button>
<button onClick={next} className={`w-full md:flex-1 ${th.m} ${th.mh} text-white font-bold py-3 rounded-xl transition flex justify-center items-center gap-2 text-lg shadow-md`}>{qi<qs.length-1?'次のポイントへ':'結果を見る'}<ArrowRight size={20}/></button>
</div></div>}
</div></div>);

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
